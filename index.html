<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>得吃小曲 - Vinyl Player</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
background:black;
font-family:
"PingFang SC",
"Microsoft YaHei",
sans-serif;
color:white;
position:relative;
}

/* 背景 */

.background{
position:fixed;
inset:0;

background:
url('背景图片.jpg')
center/cover
no-repeat;

filter:
blur(16px)
brightness(.62)
saturate(1.2);

transform:scale(1.08);

opacity:.95;
}

/* 暗层 */

.overlay{
position:fixed;
inset:0;

background:
linear-gradient(
90deg,
rgba(0,0,0,.45),
rgba(0,0,0,.18),
rgba(0,0,0,.42)
);

backdrop-filter:blur(1px);
}

/* 主布局 */

.container{
position:relative;
z-index:5;

width:100%;
height:100%;

display:flex;
align-items:center;
justify-content:space-between;

padding:4vw 6vw;

gap:3vw;
}

/* 左边 */

.left{
width:50%;

display:flex;
align-items:center;
justify-content:center;
}

/* 黑胶 */

.vinyl{
width:42vw;
max-width:520px;

aspect-ratio:1/1;

border-radius:50%;

background:
radial-gradient(
circle,
#1a1a1a 0%,
#000 58%,
#111 72%,
#000 100%
);

position:relative;

display:flex;
align-items:center;
justify-content:center;

box-shadow:
0 0 40px rgba(0,0,0,.45),
0 0 120px rgba(255,0,120,.12),
0 0 180px rgba(0,140,255,.12);

animation:spin 8s linear infinite;
animation-play-state:paused;
}

.vinyl.playing{
animation-play-state:running;
}

/* 黑胶纹路 */

.vinyl::before{
content:'';

position:absolute;
inset:18px;

border-radius:50%;

background:
repeating-radial-gradient(
circle,
rgba(255,255,255,.045) 0px,
rgba(255,255,255,.045) 2px,
transparent 3px,
transparent 10px
);

opacity:.35;
}

/* 中心孔 */

.vinyl::after{
content:'';

position:absolute;

width:16px;
height:16px;

border-radius:50%;

background:#ddd;

z-index:5;
}

/* 专辑图 */

.album{
width:48%;
height:48%;

border-radius:50%;
overflow:hidden;

z-index:3;

box-shadow:
0 0 30px rgba(255,255,255,.18);
}

.album img{
width:100%;
height:100%;
object-fit:cover;
}

/* 右边 */

.right{
width:50%;

display:flex;
flex-direction:column;
justify-content:center;
}

/* 标题 */

.title{
font-size:clamp(38px,4vw,68px);

font-weight:800;

margin-bottom:12px;

background:
linear-gradient(
90deg,
#ffffff,
#ff7ad9,
#7ac7ff,
#ffffff
);

background-size:300% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:titleGlow 6s linear infinite;

text-shadow:
0 0 20px rgba(255,255,255,.15);
}

/* 副标题 */

.artist{
font-size:18px;
opacity:.75;

margin-bottom:34px;

letter-spacing:2px;
}

/* 歌词容器 */

.lyric-container{
height:46vh;

overflow:hidden;

position:relative;

mask-image:
linear-gradient(
to bottom,
transparent,
white 10%,
white 90%,
transparent
);
}

/* 歌词 */

.lyrics{
display:flex;
flex-direction:column;

gap:26px;

transition:.45s ease;
}

/* 普通歌词 */

.line{
font-size:24px;

font-weight:600;

letter-spacing:1px;

opacity:.45;

transform:scale(.96);

transition:.4s;

background:
linear-gradient(
90deg,
rgba(255,255,255,.7),
rgba(255,120,220,.75),
rgba(120,200,255,.75)
);

background-size:250% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:lyricFlow 8s linear infinite;

text-shadow:
0 0 12px rgba(255,255,255,.12);
}

/* 当前歌词 */

.line.active{
opacity:1;

transform:scale(1.06);

background:
linear-gradient(
90deg,
#ffffff,
#ff5cc8,
#57b8ff,
#ffffff
);

background-size:300% auto;

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

animation:lyricFlow 3s linear infinite;

text-shadow:
0 0 12px rgba(255,255,255,.85),
0 0 32px rgba(255,120,220,.5),
0 0 52px rgba(120,200,255,.35);
}

/* 进度条 */

.progress-area{
margin-top:34px;
}

.time{
display:flex;
justify-content:space-between;

font-size:13px;

opacity:.75;

margin-bottom:8px;
}

.progress{
width:100%;
height:6px;

background:
rgba(255,255,255,.15);

border-radius:999px;

overflow:hidden;

cursor:pointer;
}

.progress-bar{
width:0%;
height:100%;

background:
linear-gradient(
90deg,
#ffffff,
#ff5cc8,
#57b8ff
);

border-radius:999px;

box-shadow:
0 0 12px rgba(255,255,255,.5);

transition:.1s linear;
}

/* 控制按钮 */

.controls{
margin-top:35px;

display:flex;
align-items:center;

gap:28px;
}

.btn{
width:72px;
height:72px;

border:none;
border-radius:50%;

cursor:pointer;

font-size:24px;

background:
rgba(255,255,255,.12);

color:white;

backdrop-filter:blur(12px);

transition:.25s;
}

.play{
width:90px;
height:90px;

font-size:30px;

background:
rgba(255,255,255,.18);

box-shadow:
0 0 30px rgba(255,255,255,.15);
}

.btn:hover{
transform:scale(1.08);

background:
rgba(255,255,255,.2);
}

.btn:active{
transform:scale(.92);
}

/* 动画 */

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes titleGlow{

0%{
background-position:0% center;
}

100%{
background-position:300% center;
}

}

@keyframes lyricFlow{

0%{
background-position:0% center;
}

100%{
background-position:300% center;
}

}

/* 手机适配 */

@media(max-width:900px){

.container{
flex-direction:column;

padding-top:6vh;

gap:30px;
}

.left,
.right{
width:100%;
}

.vinyl{
width:78vw;
max-width:420px;
}

.right{
text-align:center;
}

.controls{
justify-content:center;
}

.line{
font-size:18px;
}

}

</style>
</head>

<body>

<div class="background"></div>

<div class="overlay"></div>

<div class="container">

<!-- 左边 -->

<div class="left">

<div class="vinyl" id="vinyl">

<div class="album">
<img src="背景图片.jpg">
</div>

</div>

</div>

<!-- 右边 -->

<div class="right">

<div class="title" id="songTitle">
得吃小曲
</div>

<div class="artist">
NFC MUSIC PLAYER
</div>

<div class="lyric-container">
<div class="lyrics" id="lyrics"></div>
</div>

<div class="progress-area">

<div class="time">

<span id="current">0:00</span>

<span id="duration">0:00</span>

</div>

<div class="progress" id="progress">

<div class="progress-bar" id="progressBar"></div>

</div>

</div>

<div class="controls">

<button class="btn" id="prevBtn">⏮</button>

<button class="btn play" id="playBtn">▶</button>

<button class="btn" id="nextBtn">⏭</button>

</div>

</div>

</div>

<audio id="audio"></audio>

<script>

/* 歌单 */

const playlist = [

{
title:"得吃小曲",
file:"得吃小曲.mp3",
cover:"背景图片.jpg",
lrc:"dechi.lrc"
},

{
title:"Beautiful Love",
file:"Beautiful Love.mp3",
cover:"背景图片.jpg",
lrc:"Beautiful Love.lrc"
}

];

let currentSong = 0;

/* DOM */

const audio =
document.getElementById('audio');

const lyricsEl =
document.getElementById('lyrics');

const playBtn =
document.getElementById('playBtn');

const progressBar =
document.getElementById('progressBar');

const currentEl =
document.getElementById('current');

const durationEl =
document.getElementById('duration');

const vinyl =
document.getElementById('vinyl');

const titleEl =
document.getElementById('songTitle');

const prevBtn =
document.getElementById('prevBtn');

const nextBtn =
document.getElementById('nextBtn');

const progress =
document.getElementById('progress');

/* 解析歌词 */

async function loadLrc(file){

const res = await fetch(file);

const text = await res.text();

const lines = text.split(/\r?\n/);

const lrc = [];

for(const line of lines){

const matches =
[...line.matchAll(/\[(\d+):(\d+(?:\.\d+)?)\]/g)];

if(matches.length===0) continue;

const content =
line.replace(/\[.*?\]/g,'').trim();

if(!content) continue;

matches.forEach(match=>{

const min =
parseInt(match[1]);

const sec =
parseFloat(match[2]);

lrc.push({

time:min*60+sec,

text:content

});

});

}

lrc.sort((a,b)=>a.time-b.time);

return lrc;

}

/* 加载歌曲 */

async function loadSong(index){

const song =
playlist[index];

audio.src =
song.file;

titleEl.innerHTML =
song.title;

document.querySelector('.background')
.style.background =
`url('${song.cover}') center/cover`;

document.querySelector('.album img')
.src = song.cover;

lyricsEl.innerHTML='';

const lyrics =
await loadLrc(song.lrc);

song.lyrics = lyrics;

lyrics.forEach(line=>{

const div =
document.createElement('div');

div.classList.add('line');

div.innerText =
line.text;

lyricsEl.appendChild(div);

});

}

/* 播放 */

function playSong(){

audio.play();

playBtn.innerHTML='❚❚';

vinyl.classList.add('playing');

}

/* 暂停 */

function pauseSong(){

audio.pause();

playBtn.innerHTML='▶';

vinyl.classList.remove('playing');

}

/* 播放暂停 */

playBtn.addEventListener('click',()=>{

if(audio.paused){

playSong();

}else{

pauseSong();

}

});

/* 上一首 */

prevBtn.addEventListener('click',async()=>{

currentSong--;

if(currentSong<0){

currentSong=
playlist.length-1;

}

await loadSong(currentSong);

playSong();

});

/* 下一首 */

nextBtn.addEventListener('click',async()=>{

currentSong++;

if(currentSong>=playlist.length){

currentSong=0;

}

await loadSong(currentSong);

playSong();

});

/* 时间格式 */

function formatTime(time){

const min =
Math.floor(time/60);

const sec =
Math.floor(time%60);

return `${min}:${sec<10?'0'+sec:sec}`;

}

/* 更新时间 */

audio.addEventListener('timeupdate',()=>{

const percent =
(audio.currentTime/audio.duration)*100;

progressBar.style.width =
percent+'%';

currentEl.innerHTML =
formatTime(audio.currentTime);

if(audio.duration){

durationEl.innerHTML =
formatTime(audio.duration);

}

const lines =
document.querySelectorAll('.line');

if(!playlist[currentSong].lyrics)
return;

playlist[currentSong].lyrics.forEach((line,index)=>{

if(audio.currentTime>=line.time){

lines.forEach(l=>
l.classList.remove('active')
);

if(lines[index]){

lines[index]
.classList.add('active');

lyricsEl.style.transform =
`translateY(-${Math.max(0,(index-3)*58)}px)`;

}

}

});

});

/* 点击进度条 */

progress.addEventListener('click',e=>{

const width =
progress.clientWidth;

const clickX =
e.offsetX;

audio.currentTime =
(clickX/width)
*audio.duration;

});

/* 自动下一首 */

audio.addEventListener('ended',async()=>{

currentSong++;

if(currentSong>=playlist.length){

currentSong=0;

}

await loadSong(currentSong);

playSong();

});

/* 初始化 */

(async()=>{

await loadSong(currentSong);

playSong();

})();

</script>

</body>
</html>
